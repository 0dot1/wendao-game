<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>问道 H5 - 正版回合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'SimSun', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            touch-action: none;
        }
        
        .game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #1a0f0f 0%, #2d1f1f 50%, #1a0f0f 100%);
        }
        
        /* 战斗场景背景 */
        .battle-scene {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 70%, rgba(139, 69, 19, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(160, 82, 45, 0.2) 0%, transparent 50%),
                linear-gradient(180deg, #0d0808 0%, #1a0f0f 30%, #2a1a1a 70%, #0d0808 100%);
            overflow: hidden;
        }
        
        /* 地面纹理 */
        .ground-texture {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 20px,
                    rgba(139, 69, 19, 0.1) 20px,
                    rgba(139, 69, 19, 0.1) 21px
                ),
                radial-gradient(ellipse at center, rgba(101, 67, 33, 0.4) 0%, transparent 70%);
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center bottom;
        }
        
        /* 顶部信息栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 100;
        }
        
        .round-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffd700;
            font-size: 14px;
        }
        
        .round-number {
            background: linear-gradient(135deg, #8b4513, #d2691e);
            padding: 5px 15px;
            border-radius: 15px;
            border: 1px solid #ffd700;
            font-weight: bold;
        }
        
        .countdown {
            font-size: 28px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
        
        .auto-btn {
            background: linear-gradient(135deg, #2c5530, #3d7a45);
            border: 1px solid #4a9a55;
            color: #fff;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
        }
        
        /* 战斗记录按钮 */
        .record-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid #8b4513;
            color: #d2691e;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }
        
        /* 角色站位区域 */
        .battle-field {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            bottom: 180px;
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
        }
        
        .team-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            width: 80px;
        }
        
        .team-side.left {
            align-items: flex-start;
        }
        
        .team-side.right {
            align-items: flex-end;
        }
        
        /* 角色卡片 */
        .character-card {
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.3s;
        }
        
        .character-card.active {
            transform: scale(1.1);
        }
        
        .character-card.dead {
            opacity: 0.5;
            filter: grayscale(100%);
        }
        
        /* 角色立绘 */
        .character-sprite {
            width: 60px;
            height: 80px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            position: relative;
            box-shadow: 
                0 5px 15px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255,255,255,0.1);
            border: 2px solid;
        }
        
        /* 阵营颜色 */
        .team-left .character-sprite {
            background: linear-gradient(135deg, #1e3a5f 0%, #2e5a8f 50%, #1e3a5f 100%);
            border-color: #4a90e2;
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.4);
        }
        
        .team-right .character-sprite {
            background: linear-gradient(135deg, #5a1e1e 0%, #8f2e2e 50%, #5a1e1e 100%);
            border-color: #e24a4a;
            box-shadow: 0 0 15px rgba(226, 74, 74, 0.4);
        }
        
        /* 选中光环 */
        .character-card.target::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 40px;
            height: 10px;
            background: radial-gradient(ellipse, rgba(255,215,0,0.8) 0%, transparent 70%);
            animation: targetPulse 1s infinite;
        }
        
        @keyframes targetPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        
        /* 血条 */
        .hp-bar-container {
            width: 65px;
            margin-top: 5px;
        }
        
        .hp-bar-bg {
            height: 6px;
            background: rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .hp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
            transition: width 0.3s;
            border-radius: 2px;
        }
        
        .hp-bar-fill.high {
            background: linear-gradient(90deg, #27ae60 0%, #229954 100%);
        }
        
        .hp-bar-fill.medium {
            background: linear-gradient(90deg, #f39c12 0%, #d68910 100%);
        }
        
        /* 角色名 */
        .character-name {
            font-size: 11px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70px;
            text-align: center;
        }
        
        /* 状态图标 */
        .status-icons {
            position: absolute;
            top: -5px;
            right: -5px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .status-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            border: 1px solid;
        }
        
        /* 底部消息区域 */
        .message-area {
            position: absolute;
            bottom: 130px;
            left: 10px;
            right: 10px;
            height: 80px;
            background: rgba(0,0,0,0.6);
            border-radius: 5px;
            padding: 8px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
            border: 1px solid rgba(139, 69, 19, 0.3);
        }
        
        .message-item {
            color: #aaa;
            margin-bottom: 3px;
        }
        
        .message-item.system {
            color: #ffd700;
        }
        
        .message-item.damage {
            color: #ff6b6b;
        }
        
        .message-item.heal {
            color: #4ecdc4;
        }
        
        /* 底部操作栏 */
        .action-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.95) 100%);
            display: flex;
            padding: 10px;
            gap: 10px;
        }
        
        /* 左侧功能按钮 */
        .side-buttons {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 50px;
        }
        
        .side-btn {
            flex: 1;
            background: linear-gradient(135deg, #2c1810, #3d2820);
            border: 1px solid #8b4513;
            color: #d2691e;
            border-radius: 5px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2px;
        }
        
        .side-btn-icon {
            font-size: 16px;
        }
        
        /* 技能按钮区域 */
        .skill-area {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        
        .skill-btn {
            background: linear-gradient(135deg, #4a3728, #3d2e22);
            border: 2px solid #8b6914;
            border-radius: 8px;
            color: #ffd700;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            position: relative;
            overflow: hidden;
        }
        
        .skill-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
        }
        
        .skill-btn:active {
            transform: scale(0.95);
            border-color: #ffd700;
        }
        
        .skill-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .skill-icon {
            font-size: 20px;
        }
        
        .skill-name {
            font-weight: bold;
        }
        
        .skill-cost {
            font-size: 9px;
            color: #87ceeb;
        }
        
        /* 右侧逃跑按钮 */
        .escape-area {
            width: 60px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .escape-btn {
            flex: 1;
            background: linear-gradient(135deg, #3d2820, #2c1810);
            border: 1px solid #8b4513;
            color: #aaa;
            border-radius: 5px;
            font-size: 10px;
            cursor: pointer;
        }
        
        .escape-btn.primary {
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #fff;
            border-color: #ffd700;
        }
        
        /* 伤害数字 */
        .damage-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.8);
            animation: damageFloat 1s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes damageFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }
        
        /* 回合指示 */
        .turn-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: turnPulse 0.5s ease-out;
            pointer-events: none;
            z-index: 500;
        }
        
        @keyframes turnPulse {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        
        /* 加载画面 */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .game-logo {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        
        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b35);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <!-- 加载画面 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="game-logo">⚔️ 问道 H5</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
        <div style="color: #888; margin-top: 10px; font-size: 12px;">正在进入修仙世界...</div>
    </div>

    <div class="game-container">
        <div class="battle-scene">
            <div class="ground-texture"></div>
            
            <!-- 顶部信息栏 -->
            <div class="top-bar">
                <div class="round-info">
                    <div class="round-number">第 <span id="roundNum">1</span> 回合</div>
                    <button class="record-btn">战斗记录</button>
                </div>
                <div class="countdown" id="countdown">30</div>
                <button class="auto-btn" id="autoBtn" onclick="toggleAuto()">自动战斗</button>
            </div>
            
            <!-- 战斗区域 -->
            <div class="battle-field">
                <!-- 敌方（左侧） -->
                <div class="team-side left team-right" id="enemyTeam">
                    <!-- 由JS生成 -->
                </div>
                
                <!-- 我方（右侧） -->
                <div class="team-side right team-left" id="playerTeam">
                    <!-- 由JS生成 -->
                </div>
            </div>
            
            <!-- 消息区域 -->
            <div class="message-area" id="messageArea">
                <div class="message-item system">战斗开始！遭遇了花妖！</div>
            </div>
            
            <!-- 操作栏 -->
            <div class="action-bar">
                <div class="side-buttons">
                    <button class="side-btn" onclick="showPets()">
                        <span class="side-btn-icon">🐯</span>
                        <span>宠物</span>
                    </button>
                    <button class="side-btn" onclick="showItems()">
                        <span class="side-btn-icon">💊</span>
                        <span>道具</span>
                    </button>
                    <button class="side-btn" onclick="showDefense()">
                        <span class="side-btn-icon">🛡️</span>
                        <span>防御</span>
                    </button>
                </div>
                
                <div class="skill-area" id="skillArea">
                    <button class="skill-btn" onclick="useSkill(0)">
                        <span class="skill-icon">⚔️</span>
                        <span class="skill-name">物理攻击</span>
                    </button>
                    <button class="skill-btn" onclick="useSkill(1)">
                        <span class="skill-icon">🔥</span>
                        <span class="skill-name">烈火术</span>
                        <span class="skill-cost">30MP</span>
                    </button>
                    <button class="skill-btn" onclick="useSkill(2)">
                        <span class="skill-icon">💧</span>
                        <span class="skill-name">寒冰术</span>
                        <span class="skill-cost">30MP</span>
                    </button>
                    <button class="skill-btn" onclick="useSkill(3)">
                        <span class="skill-icon">⚡</span>
                        <span class="skill-name">雷霆万钧</span>
                        <span class="skill-cost">60MP</span>
                    </button>
                </div>
                
                <div class="escape-area">
                    <button class="escape-btn" onclick="showCapture()">捕捉</button>
                    <button class="escape-btn primary" onclick="tryEscape()">逃跑</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏数据
        const gameData = {
            round: 1,
            countdown: 30,
            isPlayerTurn: true,
            autoBattle: false,
            selectedTarget: null
        };
        
        // 我方队伍
        const playerTeam = [
            { id: 'p1', name: '云霄童子', emoji: '👨‍🎤', hp: 850, maxHp: 850, mp: 320, maxMp: 320, element: 'gold', isPlayer: true },
            { id: 'p2', name: '紫霞仙子', emoji: '👩‍🎤', hp: 620, maxHp: 620, mp: 450, maxMp: 450, element: 'wood', isPet: true },
            { id: 'p3', name: '水灵童子', emoji: '🧙‍♂️', hp: 580, maxHp: 580, mp: 380, maxMp: 380, element: 'water' },
            { id: 'p4', name: '火云邪神', emoji: '👺', hp: 720, maxHp: 720, mp: 280, maxMp: 280, element: 'fire' },
            { id: 'p5', name: '土行孙', emoji: '🧌', hp: 950, maxHp: 950, mp: 200, maxMp: 200, element: 'earth' }
        ];
        
        // 敌方队伍
        const enemyTeam = [
            { id: 'e1', name: '花妖', emoji: '🌸', hp: 420, maxHp: 420, element: 'wood' },
            { id: 'e2', name: '花妖', emoji: '🌸', hp: 380, maxHp: 380, element: 'wood' },
            { id: 'e3', name: '花妖首领', emoji: '🌺', hp: 850, maxHp: 850, element: 'wood', isBoss: true },
            { id: 'e4', name: '花妖', emoji: '🌸', hp: 400, maxHp: 400, element: 'wood' },
            { id: 'e5', name: '乌龙', emoji: '🐍', hp: 680, maxHp: 680, element: 'water' }
        ];
        
        // 初始化
        function init() {
            // 加载进度
            let progress = 0;
            const loadingInterval = setInterval(() => {
                progress += 10;
                document.getElementById('loadingProgress').style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(loadingInterval);
                    setTimeout(() => {
                        document.getElementById('loadingScreen').classList.add('hidden');
                    }, 500);
                }
            }, 100);
            
            renderTeams();
            startCountdown();
        }
        
        // 渲染队伍
        function renderTeams() {
            const enemyContainer = document.getElementById('enemyTeam');
            const playerContainer = document.getElementById('playerTeam');
            
            enemyContainer.innerHTML = enemyTeam.map(char => createCharacterCard(char, 'enemy')).join('');
            playerContainer.innerHTML = playerTeam.map(char => createCharacterCard(char, 'player')).join('');
        }
        
        // 创建角色卡片
        function createCharacterCard(char, side) {
            const hpPercent = (char.hp / char.maxHp) * 100;
            const hpClass = hpPercent > 50 ? 'high' : hpPercent > 25 ? 'medium' : '';
            
            return `
                <div class="character-card ${side}" id="${char.id}" onclick="selectTarget('${char.id}')">
                    <div class="character-sprite" id="${char.id}-sprite">${char.emoji}</div>
                    <div class="hp-bar-container">
                        <div class="hp-bar-bg">
                            <div class="hp-bar-fill ${hpClass}" style="width: ${hpPercent}%"></div>
                        </div>
                    </div>
                    <div class="character-name">${char.name}</div>
                </div>
            `;
        }
        
        // 倒计时
        function startCountdown() {
            setInterval(() => {
                if (gameData.countdown > 0) {
                    gameData.countdown--;
                    document.getElementById('countdown').textContent = gameData.countdown;
                } else {
                    // 时间到，自动攻击
                    autoAttack();
                    gameData.countdown = 30;
                }
            }, 1000);
        }
        
        // 自动攻击
        function autoAttack() {
            if (!gameData.autoBattle) return;
            
            const target = enemyTeam.find(e => e.hp > 0);
            if (target) {
                performAttack('p1', target.id, 150 + Math.random() * 50);
            }
        }
        
        // 使用技能
        function useSkill(skillIndex) {
            const skills = [
                { name: '物理攻击', damage: 120, mp: 0 },
                { name: '烈火术', damage: 280, mp: 30 },
                { name: '寒冰术', damage: 260, mp: 30 },
                { name: '雷霆万钧', damage: 450, mp: 60 }
            ];
            
            const skill = skills[skillIndex];
            const target = enemyTeam.find(e => e.hp > 0);
            
            if (target) {
                performAttack('p1', target.id, skill.damage + Math.random() * 50);
                addMessage(`云霄童子使用了${skill.name}！`, 'system');
            }
        }
        
        // 执行攻击
        function performAttack(attackerId, targetId, damage) {
            const targetEl = document.getElementById(targetId + '-sprite');
            if (!targetEl) return;
            
            // 显示伤害数字
            showDamage(targetEl, Math.floor(damage));
            
            // 更新血量
            const target = enemyTeam.find(e => e.id === targetId) || playerTeam.find(p => p.id === targetId);
            if (target) {
                target.hp = Math.max(0, target.hp - damage);
                renderTeams();
                
                if (target.hp <= 0) {
                    addMessage(`${target.name}被击败了！`, 'damage');
                    document.getElementById(targetId).classList.add('dead');
                }
            }
            
            // 重置倒计时
            gameData.countdown = 30;
            gameData.round++;
            document.getElementById('roundNum').textContent = gameData.round;
        }
        
        // 显示伤害数字
        function showDamage(element, damage) {
            const rect = element.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'damage-popup';
            popup.textContent = damage;
            popup.style.left = rect.left + rect.width / 2 + 'px';
            popup.style.top = rect.top + 'px';
            document.body.appendChild(popup);
            
            setTimeout(() => popup.remove(), 1000);
        }
        
        // 添加消息
        function addMessage(text, type = '') {
            const area = document.getElementById('messageArea');
            const msg = document.createElement('div');
            msg.className = 'message-item ' + type;
            msg.textContent = text;
            area.appendChild(msg);
            area.scrollTop = area.scrollHeight;
        }
        
        // 切换自动战斗
        function toggleAuto() {
            gameData.autoBattle = !gameData.autoBattle;
            document.getElementById('autoBtn').textContent = gameData.autoBattle ? '停止自动' : '自动战斗';
            document.getElementById('autoBtn').style.background = gameData.autoBattle 
                ? 'linear-gradient(135deg, #8b4513, #a0522d)' 
                : 'linear-gradient(135deg, #2c5530, #3d7a45)';
        }
        
        // 其他功能按钮
        function showPets() { addMessage('打开宠物面板...', 'system'); }
        function showItems() { addMessage('打开道具面板...', 'system'); }
        function showDefense() { addMessage('进入防御姿态！', 'system'); }
        function showCapture() { addMessage('尝试捕捉...', 'system'); }
        function tryEscape() { addMessage('逃跑成功！', 'heal'); }
        function selectTarget(id) { gameData.selectedTarget = id; }
        
        // 启动
        window.onload = init;
    </script>
</body>
</html>
