<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>问道 H5 - 五行修仙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .game-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 10px;
        }
        
        /* 头部信息 */
        .header {
            background: linear-gradient(90deg, #8b4513, #d2691e);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 2px solid #ffd700;
        }
        
        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .player-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .player-level {
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        
        .stats-bar {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
        }
        
        .stat-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
        }
        
        .hp-icon { background: #e74c3c; }
        .mp-icon { background: #3498db; }
        .exp-icon { background: #f39c12; }
        
        /* 战斗场景 */
        .battle-scene {
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 50%, #2c3e50 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            min-height: 300px;
            position: relative;
            border: 3px solid #8b4513;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        
        .battle-ground {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .character {
            text-align: center;
            position: relative;
        }
        
        .character-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            margin: 0 auto 10px;
            border: 3px solid;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .character-avatar.player {
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
        }
        
        .character-avatar.enemy {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-color: #8b0000;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }
        
        .character-avatar.pet {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.5);
            width: 60px;
            height: 60px;
            font-size: 1.8em;
        }
        
        .character-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .character-element {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75em;
            margin-bottom: 5px;
        }
        
        .element-metal { background: linear-gradient(135deg, #c0c0c0, #808080); }
        .element-wood { background: linear-gradient(135deg, #27ae60, #229954); }
        .element-water { background: linear-gradient(135deg, #3498db, #2980b9); }
        .element-fire { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .element-earth { background: linear-gradient(135deg, #f39c12, #d68910); }
        
        .hp-bar {
            width: 100px;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin: 0 auto;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            transition: width 0.3s;
            border-radius: 4px;
        }
        
        .hp-text {
            font-size: 0.75em;
            margin-top: 3px;
        }
        
        /* 伤害数字 */
        .damage-number {
            position: absolute;
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: damageFloat 1s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes damageFloat {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
        }
        
        /* 战斗日志 */
        .battle-log {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            height: 100px;
            overflow-y: auto;
            font-size: 0.85em;
            line-height: 1.6;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-damage { color: #e74c3c; }
        .log-heal { color: #27ae60; }
        .log-buff { color: #f39c12; }
        
        /* 控制面板 */
        .control-panel {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid #8b4513;
        }
        
        .skill-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .skill-btn {
            padding: 12px 8px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #8b4513, #a0522d);
            color: #fff;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #ffd700;
            position: relative;
            overflow: hidden;
        }
        
        .skill-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.4);
        }
        
        .skill-btn:active {
            transform: scale(0.95);
        }
        
        .skill-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .skill-name {
            font-weight: bold;
            margin-bottom: 3px;
        }
        
        .skill-cost {
            font-size: 0.75em;
            opacity: 0.8;
        }
        
        .action-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .action-btn {
            padding: 15px 8px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-attack {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
        }
        
        .btn-defend {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
        }
        
        .btn-item {
            background: linear-gradient(135deg, #27ae60, #229954);
            color: #fff;
        }
        
        .btn-run {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: #fff;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        /* 五行相克提示 */
        .element-tips {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.85em;
        }
        
        .element-cycle {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        
        .element-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        /* 宠物面板 */
        .pet-panel {
            background: linear-gradient(135deg, #4a148c, #6a1b9a);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #ffd700;
        }
        
        .pet-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .pet-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .pet-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            border: 3px solid #ffd700;
        }
        
        .pet-stats {
            flex: 1;
        }
        
        .pet-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .pet-level {
            font-size: 0.8em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        /* 菜单按钮 */
        .menu-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b4513, #d2691e);
            border: 2px solid #ffd700;
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
            z-index: 100;
        }
        
        /* 弹窗 */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            border: 3px solid #ffd700;
            text-align: center;
        }
        
        .modal-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 20px;
        }
        
        .modal-text {
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #8b4513, #d2691e);
            color: #fff;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ffd700;
        }
    </style>
</head>
<body>
    <button class="menu-btn" onclick="showMenu()">☰</button>
    
    <div class="game-container">
        <!-- 玩家信息 -->
        <div class="header">
            <div class="player-info">
                <div class="player-name">⚔️ 修仙者</div>
                <div class="player-level">Lv.<span id="playerLevel">1</span></div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-icon hp-icon">❤</div>
                    <span id="playerHp">100/100</span>
                </div>
                <div class="stat-item">
                    <div class="stat-icon mp-icon">✦</div>
                    <span id="playerMp">50/50</span>
                </div>
                <div class="stat-item">
                    <div class="stat-icon exp-icon">⭐</div>
                    <span id="playerExp">0/100</span>
                </div>
            </div>
        </div>
        
        <!-- 五行相克提示 -->
        <div class="element-tips">
            <div>五行相克：金→木→土→水→火→金</div>
            <div class="element-cycle">
                <div class="element-icon element-metal">金</div>
                <span>→</span>
                <div class="element-icon element-wood">木</div>
                <span>→</span>
                <div class="element-icon element-earth">土</div>
                <span>→</span>
                <div class="element-icon element-water">水</div>
                <span>→</span>
                <div class="element-icon element-fire">火</div>
                <span>→</span>
                <div class="element-icon element-metal">金</div>
            </div>
        </div>
        
        <!-- 宠物面板 -->
        <div class="pet-panel" id="petPanel">
            <div class="pet-title">🐾 出战宠物</div>
            <div class="pet-info">
                <div class="pet-avatar">🐯</div>
                <div class="pet-stats">
                    <div class="pet-name">烈焰虎</div>
                    <div class="pet-level">Lv.1 | 火系</div>
                    <div class="hp-bar">
                        <div class="hp-fill" id="petHpFill" style="width: 100%"></div>
                    </div>
                    <div class="hp-text" id="petHp">80/80</div>
                </div>
            </div>
        </div>
        
        <!-- 战斗场景 -->
        <div class="battle-scene">
            <div class="battle-ground">
                <!-- 玩家方 -->
                <div class="character">
                    <div class="character-avatar player" id="playerAvatar">🧙</div>
                    <div class="character-name">修仙者</div>
                    <div class="character-element element-water">水系</div>
                    <div class="hp-bar">
                        <div class="hp-fill" id="playerHpBar" style="width: 100%"></div>
                    </div>
                    <div class="hp-text"><span id="playerHpText">100</span>/<span id="playerMaxHp">100</span></div>
                </div>
                
                <!-- VS -->
                <div style="font-size: 1.5em; font-weight: bold; color: #ffd700;">VS</div>
                
                <!-- 敌方 -->
                <div class="character">
                    <div class="character-avatar enemy" id="enemyAvatar">👹</div>
                    <div class="character-name" id="enemyName">野狼</div>
                    <div class="character-element element-wood" id="enemyElement">木系</div>
                    <div class="hp-bar">
                        <div class="hp-fill" id="enemyHpBar" style="width: 100%"></div>
                    </div>
                    <div class="hp-text"><span id="enemyHpText">60</span>/<span id="enemyMaxHp">60</span></div>
                </div>
            </div>
            
            <!-- 战斗日志 -->
            <div class="battle-log" id="battleLog">
                <div class="log-entry">战斗开始！遇到了野狼！</div>
            </div>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="skill-row">
                <button class="skill-btn" onclick="useSkill('wave')">
                    <div class="skill-name">🌊 水波术</div>
                    <div class="skill-cost">10 MP</div>
                </button>
                <button class="skill-btn" onclick="useSkill('heal')">
                    <div class="skill-name">💚 治愈术</div>
                    <div class="skill-cost">15 MP</div>
                </button>
                <button class="skill-btn" onclick="useSkill('ultimate')">
                    <div class="skill-name">⚡ 五行破</div>
                    <div class="skill-cost">30 MP</div>
                </button>
            </div>
            
            <div class="action-row">
                <button class="action-btn btn-attack" onclick="playerAttack()">⚔️ 攻击</button>
                <button class="action-btn btn-defend" onclick="playerDefend()">🛡️ 防御</button>
                <button class="action-btn btn-item" onclick="useItem()">💊 道具</button>
                <button class="action-btn btn-run" onclick="tryRun()">🏃 逃跑</button>
            </div>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">提示</div>
            <div class="modal-text" id="modalText"></div>
            <button class="modal-btn" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        // 游戏数据
        const player = {
            name: '修仙者',
            level: 1,
            hp: 100,
            maxHp: 100,
            mp: 50,
            maxMp: 50,
            exp: 0,
            maxExp: 100,
            element: 'water',
            attack: 20,
            defense: 10
        };
        
        const pet = {
            name: '烈焰虎',
            level: 1,
            hp: 80,
            maxHp: 80,
            element: 'fire',
            attack: 15
        };
        
        let enemy = {
            name: '野狼',
            hp: 60,
            maxHp: 60,
            element: 'wood',
            attack: 12,
            exp: 20
        };
        
        let isPlayerTurn = true;
        let isDefending = false;
        
        // 五行相克关系
        const elementAdvantage = {
            metal: 'wood',
            wood: 'earth',
            earth: 'water',
            water: 'fire',
            fire: 'metal'
        };
        
        // 计算属性克制
        function getElementBonus(attacker, defender) {
            if (elementAdvantage[attacker] === defender) {
                return 1.5; // 克制，伤害+50%
            } else if (elementAdvantage[defender] === attacker) {
                return 0.7; // 被克，伤害-30%
            }
            return 1.0;
        }
        
        // 玩家攻击
        function playerAttack() {
            if (!isPlayerTurn) return;
            
            const bonus = getElementBonus(player.element, enemy.element);
            const damage = Math.floor((player.attack + Math.random() * 10) * bonus);
            
            enemy.hp = Math.max(0, enemy.hp - damage);
            showDamage('enemyAvatar', damage, bonus > 1 ? '#ff6b6b' : '#fff');
            
            let logText = `你攻击了${enemy.name}，造成${damage}点伤害`;
            if (bonus > 1) logText += ' (五行相克！)';
            else if (bonus < 1) logText += ' (被克制...)'
            addLog(logText, 'log-damage');
            
            updateUI();
            
            if (enemy.hp <= 0) {
                setTimeout(() => winBattle(), 500);
            } else {
                isPlayerTurn = false;
                setTimeout(enemyTurn, 1000);
            }
        }
        
        // 使用技能
        function useSkill(skill) {
            if (!isPlayerTurn) return;
            
            let damage = 0;
            let cost = 0;
            let skillName = '';
            
            switch(skill) {
                case 'wave':
                    cost = 10;
                    skillName = '水波术';
                    damage = Math.floor((player.attack + 20) * getElementBonus(player.element, enemy.element));
                    break;
                case 'heal':
                    cost = 15;
                    skillName = '治愈术';
                    break;
                case 'ultimate':
                    cost = 30;
                    skillName = '五行破';
                    damage = Math.floor((player.attack + 50) * getElementBonus(player.element, enemy.element));
                    break;
            }
            
            if (player.mp < cost) {
                showModal('提示', '法力不足！');
                return;
            }
            
            player.mp -= cost;
            
            if (skill === 'heal') {
                const heal = 40;
                player.hp = Math.min(player.maxHp, player.hp + heal);
                addLog(`使用${skillName}，恢复${heal}点生命`, 'log-heal');
            } else {
                enemy.hp = Math.max(0, enemy.hp - damage);
                showDamage('enemyAvatar', damage, '#ff6b6b');
                let logText = `使用${skillName}，造成${damage}点伤害`;
                if (getElementBonus(player.element, enemy.element) > 1) logText += ' (五行相克！)';
                addLog(logText, 'log-damage');
            }
            
            updateUI();
            
            if (enemy.hp <= 0) {
                setTimeout(() => winBattle(), 500);
            } else {
                isPlayerTurn = false;
                setTimeout(enemyTurn, 1000);
            }
        }
        
        // 防御
        function playerDefend() {
            if (!isPlayerTurn) return;
            isDefending = true;
            addLog('你摆出了防御姿态，受到伤害减少50%', 'log-buff');
            isPlayerTurn = false;
            setTimeout(enemyTurn, 1000);
        }
        
        // 使用道具
        function useItem() {
            if (!isPlayerTurn) return;
            
            if (player.hp >= player.maxHp) {
                showModal('提示', '生命值已满！');
                return;
            }
            
            const heal = 50;
            player.hp = Math.min(player.maxHp, player.hp + heal);
            addLog(`使用了金疮药，恢复${heal}点生命`, 'log-heal');
            updateUI();
            
            isPlayerTurn = false;
            setTimeout(enemyTurn, 1000);
        }
        
        // 逃跑
        function tryRun() {
            if (!isPlayerTurn) return;
            
            if (Math.random() > 0.5) {
                showModal('成功', '你成功逃跑了！');
                setTimeout(() => spawnNewEnemy(), 1500);
            } else {
                addLog('逃跑失败！', 'log-damage');
                isPlayerTurn = false;
                setTimeout(enemyTurn, 1000);
            }
        }
        
        // 敌人回合
        function enemyTurn() {
            const bonus = getElementBonus(enemy.element, player.element);
            let damage = Math.floor((enemy.attack + Math.random() * 5) * bonus);
            
            if (isDefending) {
                damage = Math.floor(damage * 0.5);
                isDefending = false;
            }
            
            player.hp = Math.max(0, player.hp - damage);
            showDamage('playerAvatar', damage, '#ff6b6b');
            
            let logText = `${enemy.name}攻击了你，造成${damage}点伤害`;
            if (bonus > 1) logText += ' (五行相克！)'
            addLog(logText, 'log-damage');
            
            updateUI();
            
            if (player.hp <= 0) {
                setTimeout(() => gameOver(), 500);
            } else {
                isPlayerTurn = true;
                player.mp = Math.min(player.maxMp, player.mp + 5);
                updateUI();
            }
        }
        
        // 显示伤害数字
        function showDamage(targetId, damage, color) {
            const target = document.getElementById(targetId);
            const damageEl = document.createElement('div');
            damageEl.className = 'damage-number';
            damageEl.textContent = damage;
            damageEl.style.color = color;
            damageEl.style.left = '50%';
            damageEl.style.top = '0';
            damageEl.style.transform = 'translateX(-50%)';
            target.appendChild(damageEl);
            setTimeout(() => damageEl.remove(), 1000);
        }
        
        // 战斗胜利
        function winBattle() {
            player.exp += enemy.exp;
            
            let levelUp = false;
            if (player.exp >= player.maxExp) {
                player.level++;
                player.exp -= player.maxExp;
                player.maxExp = Math.floor(player.maxExp * 1.2);
                player.maxHp += 20;
                player.hp = player.maxHp;
                player.maxMp += 10;
                player.mp = player.maxMp;
                player.attack += 5;
                levelUp = true;
            }
            
            let msg = `战斗胜利！获得${enemy.exp}点经验`;
            if (levelUp) msg += '\n恭喜升级！等级提升至' + player.level;
            
            showModal('胜利', msg);
            setTimeout(() => spawnNewEnemy(), 2000);
        }
        
        // 生成新敌人
        function spawnNewEnemy() {
            const enemies = [
                { name: '野狼', hp: 60, element: 'wood', attack: 12, exp: 20 },
                { name: '山贼', hp: 80, element: 'earth', attack: 15, exp: 30 },
                { name: '火狐', hp: 50, element: 'fire', attack: 18, exp: 25 },
                { name: '金甲虫', hp: 70, element: 'metal', attack: 14, exp: 28 },
                { name: '水妖', hp: 55, element: 'water', attack: 16, exp: 24 }
            ];
            
            const newEnemy = enemies[Math.floor(Math.random() * enemies.length)];
            enemy = { ...newEnemy, maxHp: newEnemy.hp };
            
            document.getElementById('enemyName').textContent = enemy.name;
            document.getElementById('enemyElement').textContent = getElementName(enemy.element) + '系';
            document.getElementById('enemyElement').className = 'character-element element-' + enemy.element;
            
            addLog(`遇到了${enemy.name}！`, '');
            updateUI();
            isPlayerTurn = true;
            closeModal();
        }
        
        // 获取五行名称
        function getElementName(element) {
            const names = { metal: '金', wood: '木', water: '水', fire: '火', earth: '土' };
            return names[element] || element;
        }
        
        // 游戏结束
        function gameOver() {
            showModal('游戏结束', '你被打败了！刷新页面重新开始。');
        }
        
        // 添加日志
        function addLog(text, className) {
            const log = document.getElementById('battleLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + className;
            entry.textContent = text;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
        
        // 更新UI
        function updateUI() {
            document.getElementById('playerLevel').textContent = player.level;
            document.getElementById('playerHp').textContent = `${player.hp}/${player.maxHp}`;
            document.getElementById('playerMp').textContent = `${player.mp}/${player.maxMp}`;
            document.getElementById('playerExp').textContent = `${player.exp}/${player.maxExp}`;
            
            document.getElementById('playerHpBar').style.width = (player.hp / player.maxHp * 100) + '%';
            document.getElementById('playerHpText').textContent = player.hp;
            document.getElementById('playerMaxHp').textContent = player.maxHp;
            
            document.getElementById('enemyHpBar').style.width = (enemy.hp / enemy.maxHp * 100) + '%';
            document.getElementById('enemyHpText').textContent = enemy.hp;
            document.getElementById('enemyMaxHp').textContent = enemy.maxHp;
            
            document.getElementById('petHp').textContent = `${pet.hp}/${pet.maxHp}`;
            document.getElementById('petHpFill').style.width = (pet.hp / pet.maxHp * 100) + '%';
        }
        
        // 弹窗
        function showModal(title, text) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        function showMenu() {
            showModal('菜单', '等级: ' + player.level + '\n攻击: ' + player.attack + '\n防御: ' + player.defense + '\n五行: 水');
        }
        
        // 初始化
        updateUI();
    </script>
</body>
</html>
